<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>AlphaConsole</title>
    
    <!-- iOS / PWA Meta Framework Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AlphaConsole">
    
    <!-- High-Stability Tailwind & Lucide Engine Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-black text-white min-h-screen font-sans antialiased selection:bg-emerald-500/40">

    <!-- MAIN CENTRAL VIEWPORT -->
    <div class="max-w-md mx-auto pb-8 min-h-screen flex flex-col px-3">
        
        <!-- ULTRA-COMPACT STICKY CONTROL DECK -->
        <div class="sticky top-0 z-40 bg-black/95 pt-3 pb-2 border-b border-zinc-900/90 backdrop-blur-md space-y-2.5">
            
            <!-- Bar: Title & Settings -->
            <div class="flex items-center justify-between">
                <header class="pt-0.5">
                    <h1 class="text-2xl font-bold tracking-tight">
                        <span class="text-emerald-500">Alpha</span><span class="text-rose-500">Console</span>
                    </h1>
                </header>
                <button onclick="toggleSettingsPanel()" class="text-zinc-400 active:scale-90 p-2 rounded-lg bg-zinc-900 border border-zinc-800 transition-all">
                    <i data-lucide="settings" id="gearIcon" class="w-5 h-5 transition-transform duration-300"></i>
                </button>
            </div>

            <!-- Collapsible API Key Drawer -->
            <div id="settingsPanel" class="bg-zinc-900 border border-emerald-500 rounded-xl p-3 shadow-2xl hidden">
                <div class="flex items-center gap-2 mb-1.5">
                    <i data-lucide="key" class="w-4 h-4 text-emerald-400"></i>
                    <h3 class="text-xs font-semibold text-white">Finnhub Token Vault</h3>
                </div>
                <div class="flex gap-2">
                    <input 
                        type="password" 
                        id="apiKeyInput" 
                        placeholder="Private token"
                        class="flex-1 bg-black border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 font-mono"
                    >
                    <button onclick="saveApiKey()" class="bg-emerald-600 active:bg-emerald-700 text-white font-semibold text-xs px-4 rounded-lg transition-all">
                        Save
                    </button>
                </div>
            </div>

            <!-- Control Deck Console Matrix -->
            <div class="bg-zinc-900/60 border border-zinc-800/60 rounded-xl p-3 space-y-3">
                
                <!-- Row 1: Primary Dropdown, Input Search, & Add/Delete Engine -->
                <div class="flex items-center gap-2 w-full">
                    <!-- Watchlist Selector -->
                    <div class="w-[38%] relative">
                        <select 
                            id="watchlistDropdown" 
                            onchange="selectDropdownTicker(this.value)"
                            class="w-full bg-black border border-zinc-800 rounded-xl pl-3 pr-8 py-2.5 text-sm font-semibold text-white focus:outline-none focus:border-emerald-500 cursor-pointer"
                        >
                            <!-- Dynamically filled by initialization module -->
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2.5 text-zinc-500">
                            <i data-lucide="layers" class="w-4 h-4"></i>
                        </div>
                    </div>

                    <!-- Search Input Box -->
                    <div class="w-[32%] relative">
                        <input 
                            type="text" 
                            id="tickerInput" 
                            placeholder="Ticker" 
                            class="w-full bg-black border border-zinc-800 rounded-xl px-3 py-2.5 text-sm font-semibold text-white focus:outline-none focus:border-emerald-500 text-center font-mono placeholder:text-zinc-600"
                        >
                    </div>

                    <!-- Pure Icon Quick Actions Grid (+ / -) -->
                    <div class="w-[30%] flex gap-1.5 justify-end">
                        <button onclick="fetchCustomTicker()" class="flex-1 bg-emerald-950/40 border border-emerald-500/30 hover:border-emerald-500 text-emerald-400 font-bold py-2.5 rounded-xl text-lg active:scale-95 transition-all flex items-center justify-center">
                            +
                        </button>
                        <button onclick="removeActiveTicker()" class="flex-1 bg-rose-950/20 border border-rose-500/20 hover:border-rose-500/50 text-rose-400 font-bold py-2.5 rounded-xl text-lg active:scale-95 transition-all flex items-center justify-center">
                            −
                        </button>
                    </div>
                </div>

                <!-- Row 2: Allocation Sizing Desk -->
                <div class="w-full flex items-center bg-black border border-zinc-800 rounded-xl px-3 py-2.5 justify-between">
                    <div class="flex items-center min-w-0">
                        <span class="text-zinc-600 font-semibold text-sm mr-1">$</span>
                        <input 
                            type="number" 
                            id="capitalInput" 
                            value="5000" 
                            step="500"
                            oninput="executeRecalculationSequence()" 
                            class="w-32 bg-transparent text-sm font-semibold text-white focus:outline-none font-mono"
                        >
                    </div>
                    <span id="allocationDisplay" class="text-xs font-semibold text-emerald-400 font-mono">$5,000</span>
                </div>

                <!-- Row 3: Strategy, Duration, and Unified Spot Price Layout -->
                <div class="grid grid-cols-3 gap-2">
                    <!-- Strategy Readout -->
                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-zinc-500 block pl-0.5">Strategy</label>
                        <div id="strategyStatusDisplay" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-2.5 text-xs font-semibold text-emerald-400 font-mono text-center">
                            --
                        </div>
                    </div>

                    <!-- Duration Readout -->
                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-zinc-500 block pl-0.5">Duration</label>
                        <div id="dteStatusDisplay" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-2.5 text-xs font-semibold text-zinc-300 font-mono text-center">
                            --
                        </div>
                    </div>

                    <!-- Integrated Spot Price -->
                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-zinc-500 block pl-0.5">Spot Price</label>
                        <div id="livePriceBadge" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-2.5 text-xs font-semibold text-white font-mono text-center">
                            Loading...
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- SCROLLABLE CONTENT VIEWPORT -->
        <div class="mt-3 space-y-3 flex-1">
            
            <!-- Strategy Target Display Block -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden relative shadow-lg">
                
                <div id="loadingOverlay" class="absolute inset-0 bg-black/95 z-50 flex flex-col items-center justify-center gap-2 hidden">
                    <div class="w-6 h-6 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-[10px] font-semibold text-zinc-500">Querying Telemetry...</p>
                </div>

                <!-- Card Header Layout -->
                <div class="p-3 border-b border-zinc-800 bg-zinc-950/40 flex justify-between items-center">
                    <div>
                        <div class="text-[10px] font-semibold text-emerald-400 mb-0.5">Architecture Matrix</div>
                        <div class="flex items-center gap-2">
                            <h2 id="strategyTitle" class="text-base font-bold text-white">Processing...</h2>
                            <span id="strategyTypeBadge" class="text-[9px] font-bold bg-amber-500/10 text-amber-400 px-1.5 py-0.5 rounded border border-amber-500/20">--</span>
                        </div>
                    </div>
                    <div class="text-right bg-black px-2.5 py-1 rounded-lg border border-zinc-800">
                        <div class="text-[8px] font-semibold text-zinc-500 mb-0.5">Sizing</div>
                        <div id="contractSizingDisplay" class="text-sm font-bold text-emerald-400 font-mono">--</div>
                    </div>
                </div>

                <!-- Output Display Areas -->
                <div class="p-3 space-y-4">
                    <!-- HIGH CONTRAST LEGS CONTAINER -->
                    <div class="space-y-2" id="legsContainer">
                        <!-- Populated dynamically -->
                    </div>

                    <!-- Rules Parameters Row -->
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-emerald-950/20 border border-emerald-500/20 rounded-lg p-2">
                            <div class="text-emerald-400 text-[9px] font-semibold mb-0.5">Target TP</div>
                            <div id="tpDisplay" class="text-xs font-bold text-emerald-300 font-mono">50%</div>
                        </div>
                        <div class="bg-rose-950/10 border border-rose-500/20 rounded-lg p-2">
                            <div class="text-rose-400/90 text-[9px] font-semibold mb-0.5">Stop Hard</div>
                            <div id="slDisplay" class="text-xs font-bold text-rose-400/90 font-mono">30%</div>
                        </div>
                        <div class="bg-amber-950/20 border border-amber-500/20 rounded-lg p-2">
                            <div class="text-amber-400 text-[9px] font-semibold mb-0.5">Time Lock</div>
                            <div id="timeoutDisplay" class="text-xs font-bold text-amber-300 font-mono">15 DTE</div>
                        </div>
                    </div>

                    <!-- Text Explainer Core -->
                    <div class="bg-black border border-zinc-800 rounded-lg p-3 flex items-start gap-2.5">
                        <i data-lucide="sparkles" class="w-4 h-4 text-emerald-400 mt-0.5 flex-shrink-0"></i>
                        <p id="contextSummary" class="text-xs text-zinc-300 leading-relaxed font-medium">
                            Awaiting Ingestion...
                        </p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Core App Logic Engine Script -->
    <script>
        let globalLivePrice = 0;
        let globalEstimatedUnitCost = 450;
        let currentCalculatedVol = 34.2;

        let computedStrategy = "Strangle";
        let computedDte = 45;

        const baselinePreloadTickers = [
            "QQQ", "SPY", "NVDA", "AAPL", "AMZN", "MSFT", "GOOG", "META", 
            "TSLA", "ORCL", "AVGO", "NOW", "CRWD", "NFLX", "MU", "AMD"
        ];
        let currentWatchlist = [];

        function initWatchlistEngine() {
            const cached = localStorage.getItem('alpha_console_watchlist');
            if (cached) {
                currentWatchlist = JSON.parse(cached);
            } else {
                currentWatchlist = [...baselinePreloadTickers];
                localStorage.setItem('alpha_console_watchlist', JSON.stringify(currentWatchlist));
            }
            renderDropdownUI();
        }

        function renderDropdownUI() {
            const dropdown = document.getElementById('watchlistDropdown');
            const previousSelection = dropdown.value || "QQQ";
            dropdown.innerHTML = '';
            
            currentWatchlist.forEach(ticker => {
                const opt = document.createElement('option');
                opt.value = ticker;
                opt.innerText = ticker;
                opt.className = "bg-zinc-950 text-white font-mono text-base py-2";
                dropdown.appendChild(opt);
            });
            
            if(currentWatchlist.includes(previousSelection)) {
                dropdown.value = previousSelection;
            } else {
                dropdown.value = currentWatchlist[0] || "QQQ";
            }
        }

        function computeBestFitProfile(ticker) {
            if (ticker === "QQQ" || ticker === "SPY") {
                computedStrategy = "Strangle";
                computedDte = 45;
            } else if (["NVDA", "TSLA", "AMD", "CRWD", "MU"].includes(ticker)) {
                computedStrategy = "Call Spread";
                computedDte = 15;
            } else {
                computedStrategy = "Iron Condor";
                computedDte = 30;
            }

            const stratBox = document.getElementById('strategyStatusDisplay');
            stratBox.innerText = computedStrategy;
            
            document.getElementById('dteStatusDisplay').innerText = `${computedDte} DTE`;

            const timeLockText = computedDte <= 7 ? "2 Days" : (computedDte <= 15 ? "4 Days" : (computedDte === 30 ? "7 DTE" : "15 DTE"));
            document.getElementById('timeoutDisplay').innerText = timeLockText;
        }

        function selectDropdownTicker(ticker) {
            fetchRealTimeData();
        }

        function fetchCustomTicker() {
            const rawInput = document.getElementById('tickerInput').value.trim().toUpperCase();
            if(!rawInput) return;
            
            if (!currentWatchlist.includes(rawInput)) {
                currentWatchlist.unshift(rawInput);
                localStorage.setItem('alpha_console_watchlist', JSON.stringify(currentWatchlist));
                renderDropdownUI();
            }
            
            document.getElementById('watchlistDropdown').value = rawInput;
            document.getElementById('tickerInput').value = ''; 
            fetchRealTimeData();
        }

        function removeActiveTicker() {
            const dropdown = document.getElementById('watchlistDropdown');
            const targetToRemove = dropdown.value;
            if (!targetToRemove) return;
            
            currentWatchlist = currentWatchlist.filter(t => t !== targetToRemove);
            if (currentWatchlist.length === 0) {
                currentWatchlist = [...baselinePreloadTickers];
            }
            
            localStorage.setItem('alpha_console_watchlist', JSON.stringify(currentWatchlist));
            renderDropdownUI();
            fetchRealTimeData();
        }

        function toggleSettingsPanel() {
            const panel = document.getElementById('settingsPanel');
            const gear = document.getElementById('gearIcon');
            panel.classList.toggle('hidden');
            gear.classList.toggle('rotate-45');
        }

        function saveApiKey() {
            const userKey = document.getElementById('apiKeyInput').value.trim();
            if(userKey) {
                localStorage.setItem('alpha_console_finnhub_key', userKey);
                toggleSettingsPanel();
                fetchRealTimeData();
            }
        }

        function getStoredApiKey() {
            return localStorage.getItem('alpha_console_finnhub_key') || "sandbox_c8m99ha23itactv8r44g";
        }

        function executeRecalculationSequence() {
            let ticker = document.getElementById('watchlistDropdown').value || "QQQ";
            adjustEstimatedUnitCost();
            calculateLiveSizing();
            evaluateOptionStrategy(ticker, globalLivePrice, currentCalculatedVol);
        }

        function adjustEstimatedUnitCost() {
            let durationMultiplier = computedDte / 45;
            let baseStrategyCost = globalLivePrice * 0.85;

            if (computedStrategy === "Strangle") {
                baseStrategyCost = globalLivePrice * 1.6;
            } else if (computedStrategy === "Call Spread") {
                baseStrategyCost = globalLivePrice * 0.75;
            } else if (computedStrategy === "Iron Condor") {
                baseStrategyCost = globalLivePrice * 0.45; 
            }

            globalEstimatedUnitCost = Math.max(75, Math.round(baseStrategyCost * durationMultiplier));
        }

        function calculateLiveSizing() {
            const inputCapital = parseFloat(document.getElementById('capitalInput').value) || 0;
            document.getElementById('allocationDisplay').innerText = "$" + inputCapital.toLocaleString();
            let contractsCount = Math.floor(inputCapital / globalEstimatedUnitCost);
            document.getElementById('contractSizingDisplay').innerText = (contractsCount < 1 ? 0 : contractsCount) + " Cnt";
        }

        async function fetchRealTimeData() {
            let ticker = document.getElementById('watchlistDropdown').value || "QQQ";
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('hidden');

            const currentKey = getStoredApiKey();
            const cacheBuster = new Date().getTime();

            computeBestFitProfile(ticker);

            try {
                const response = await fetch(`https://api.finnhub.io/api/v1/quote?symbol=${ticker}&token=${currentKey}&_cb=${cacheBuster}`);
                const data = await response.json();
                
                globalLivePrice = data.c;
                if (!globalLivePrice || globalLivePrice === 0) {
                    if (ticker === "QQQ") globalLivePrice = 738.50;
                    else if (ticker === "SPY") globalLivePrice = 745.00;
                    else globalLivePrice = 220.50;
                }

                document.getElementById('livePriceBadge').innerText = `$${globalLivePrice.toFixed(2)}`;
                currentCalculatedVol = ticker === "QQQ" || ticker === "SPY" ? 34.2 : 24.5;
                
                adjustEstimatedUnitCost();
                evaluateOptionStrategy(ticker, globalLivePrice, currentCalculatedVol);

            } catch (error) {
                console.error("Telemetry Endpoint Intercept", error);
                let fallbackPrice = ticker === "QQQ" ? 738.50 : 745.00;
                globalLivePrice = fallbackPrice;
                document.getElementById('livePriceBadge').innerText = `$${fallbackPrice.toFixed(2)}`;
                evaluateOptionStrategy(ticker, fallbackPrice, 34.2);
            } finally {
                if (overlay) overlay.classList.add('hidden');
            }
        }

        function evaluateOptionStrategy(ticker, price, volatility) {
            let badgeText = "High Vol";
            let legs = [];
            let mechanismText = "premium value growth";

            let callStrike = Math.round(price * 1.05); 
            let putStrike = Math.round(price * 0.95);  

            if (computedStrategy === "Strangle") {
                badgeText = "Vol Breakout";
                legs = [
                    { type: "BUY Put", strike: `$${putStrike}`, delta: "0.30Δ", desc: "OTM downside shield" },
                    { type: "BUY Call", strike: `$${callStrike}`, delta: "0.30Δ", desc: "OTM variance capture" }
                ];
                mechanismText = "premium growth";
            } else if (computedStrategy === "Call Spread") {
                badgeText = "Directional";
                let spreadSellStrike = Math.round(price * 1.04);
                legs = [
                    { type: "BUY Call", strike: `$${Math.round(price)}`, delta: "0.50Δ", desc: "ATM intrinsic tracker" },
                    { type: "SELL Call", strike: `$${spreadSellStrike}`, delta: "0.28Δ", desc: "OTM theta protection" }
                ];
                mechanismText = "net spread value growth";
            } else if (computedStrategy === "Iron Condor") {
                badgeText = "Range Bound";
                legs = [
                    { type: "BUY Put", strike: `$${Math.round(price * 0.92)}`, delta: "0.05Δ", desc: "Wing protector boundary" },
                    { type: "SELL Put", strike: `$${Math.round(price * 0.96)}`, delta: "0.15Δ", desc: "Premium threshold target" },
                    { type: "SELL Call", strike: `$${Math.round(price * 1.04)}`, delta: "0.15Δ", desc: "Premium threshold target" },
                    { type: "BUY Call", strike: `$${Math.round(price * 1.08)}`, delta: "0.05Δ", desc: "Wing protector boundary" }
                ];
                mechanismText = "credit decay harvesting";
            }

            const currentTimeLock = document.getElementById('timeoutDisplay').innerText || "15 DTE";
            const analysisSummary = `Plan for $${ticker}$: Take-Profit at +50% ${mechanismText}. Hard Stop protects capital at -30% drawdown. Mandatory execution closure if flat by ${currentTimeLock} to protect against final-stage theta.`;

            document.getElementById('strategyTitle').innerText = computedStrategy;
            document.getElementById('strategyTypeBadge').innerText = badgeText;
            document.getElementById('contextSummary').innerText = analysisSummary;

            const container = document.getElementById('legsContainer');
            container.innerHTML = '';
            legs.forEach(leg => {
                const isBuy = leg.type.startsWith('BUY');
                const badgeClass = isBuy ? 'bg-emerald-500 text-black font-black' : 'bg-rose-600 text-white font-black';
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-black border-2 border-zinc-800 rounded-xl p-3 flex items-center justify-between">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] px-2 py-0.5 ${badgeClass} rounded text-center">${leg.type.split(' ')[0]}</span>
                                <span class="text-xs font-bold text-zinc-100">${leg.type.split(' ')[1]}</span>
                            </div>
                            <p class="text-[11px] text-zinc-400 font-medium">${leg.desc}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-bold text-emerald-400 font-mono block">${leg.strike}</span>
                            <span class="text-[10px] font-bold text-zinc-400 font-mono">${leg.delta}</span>
                        </div>
                    </div>
                `);
            });
            calculateLiveSizing();
        }

        document.addEventListener("DOMContentLoaded", () => {
            initWatchlistEngine();
            fetchRealTimeData(); 
            setTimeout(() => { lucide.createIcons(); }, 50);
        });
    </script>
</body>
</html>
